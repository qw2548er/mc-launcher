name: Build MCLauncher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      PYTHONUTF8: 1
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: 'x64'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 打包
      run: |
        python build.py
    
    - name: 上传打包产物
      uses: actions/upload-artifact@v4
      with:
        name: MCLauncher-Windows
        path: dist/
        retention-days: 30
